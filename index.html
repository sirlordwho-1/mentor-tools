<!DOCTYPE html>
<html>
<head>
  <title>Training Timestamp Generator</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    button {
      font-size: 20px;
      padding: 15px 25px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>Next Training Generator</h2>

<button onclick="generate()">Copy Next Training Message</button>

<div id="output"></div>

<script>
function getNextTraining() {
  const now = new Date();

  // Get current time in New York (handles DST automatically)
  const nyNow = new Date(
    now.toLocaleString("en-US", { timeZone: "America/New_York" })
  );

  const scheduleHours = [2, 5, 8, 11, 14, 17, 20, 23];

  for (let i = 0; i < scheduleHours.length; i++) {
    let next = new Date(nyNow);
    next.setHours(scheduleHours[i], 0, 0, 0);

    if (next > nyNow) {
      return next;
    }
  }

  // If none left today → first one tomorrow
  let next = new Date(nyNow);
  next.setDate(next.getDate() + 1);
  next.setHours(scheduleHours[0], 0, 0, 0);

  return next;
}

function generate() {
  const nextNY = getNextTraining();

  // Convert NY time → actual UTC timestamp
  const utcTime = new Date(
    nextNY.toLocaleString("en-US", { timeZone: "UTC" })
  );

  const unix = Math.floor(utcTime.getTime() / 1000);

  // Format ET time nicely
  const etString = nextNY.toLocaleTimeString("en-US", {
    timeZone: "America/New_York",
    hour: "numeric",
    minute: "2-digit"
  });

  const message = `The next training is <t:${unix}:R> at ${etString} ET. This is <t:${unix}:t> in your local time.`;

  document.getElementById("output").innerText = message;

  navigator.clipboard.writeText(message);
}
</script>

</body>
</html>
