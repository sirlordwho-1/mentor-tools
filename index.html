<!DOCTYPE html>
<html>
<head>
  <title>Training Timestamp Generator</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f0f0f;
      color: white;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #5865F2;
      color: white;
    }

    button:hover {
      background: #4752c4;
    }

    #output {
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      max-width: 90%;
    }
  </style>
</head>

<body>

<h2>Next Training Generator</h2>

<button onclick="generate()">Copy Next Training Message</button>

<div id="output"></div>

<script>
const scheduleHours = [2, 5, 8, 11, 14, 17, 20, 23];

function getNYNowParts() {
  const now = new Date();

  // Get NY time as components (NO string re-parsing)
  const nyString = now.toLocaleString("en-US", {
    timeZone: "America/New_York"
  });

  const ny = new Date(nyString);

  return {
    year: ny.getFullYear(),
    month: ny.getMonth(),
    day: ny.getDate(),
    hour: ny.getHours(),
    minute: ny.getMinutes(),
    seconds: ny.getSeconds()
  };
}

function getNextTraining() {
  const now = new Date();

  for (let dayOffset = 0; dayOffset < 2; dayOffset++) {

    for (let i = 0; i < scheduleHours.length; i++) {

      // Build candidate in NY time safely
      const nyNow = new Date(
        now.toLocaleString("en-US", { timeZone: "America/New_York" })
      );

      nyNow.setDate(nyNow.getDate() + dayOffset);
      nyNow.setHours(scheduleHours[i], 0, 0, 0);

      // Convert that NY time → real UTC timestamp correctly
      const utcTimestamp = Math.floor(
        new Date(
          nyNow.toLocaleString("en-US", { timeZone: "UTC" })
        ).getTime() / 1000
      );

      const nowUnix = Math.floor(Date.now() / 1000);

      if (utcTimestamp > nowUnix) {
        return utcTimestamp;
      }
    }
  }
}

function generate() {
  const unix = getNextTraining();

  const etTime = new Date(unix * 1000).toLocaleTimeString("en-US", {
    timeZone: "America/New_York",
    hour: "numeric",
    minute: "2-digit"
  });

  const message =
`The next training is <t:${unix}:R> at ${etTime} ET. This is <t:${unix}:t> in your local time.`;

  document.getElementById("output").innerText = message;
  navigator.clipboard.writeText(message);
}
</script>
  
</body>
</html>
