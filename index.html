<!DOCTYPE html>
<html>
<head>
  <title>Training Timestamp Generator</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f0f0f;
      color: white;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #5865F2;
      color: white;
    }

    button:hover {
      background: #4752c4;
    }

    #output {
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      max-width: 90%;
    }
  </style>
</head>

<body>

<h2>Next Training Generator</h2>

<button onclick="generate()">Copy Next Training Message</button>

<div id="output"></div>

<script>
const scheduleHours = [2, 5, 8, 11, 14, 17, 20, 23];

function getNextTraining() {
  const now = new Date();

  // Convert now → UTC timestamp (real baseline)
  const utcNow = now.getTime();

  // Check next 7 days worth of slots safely
  for (let day = 0; day < 2; day++) {
    for (let i = 0; i < scheduleHours.length; i++) {

      // Build a New York time manually using Intl (DST safe)
      const test = new Date(now);

      test.setUTCDate(test.getUTCDate() + day);

      // Force NY time interpretation
      const nyString = new Date(
        test.toLocaleString("en-US", { timeZone: "America/New_York" })
      );

      nyString.setHours(scheduleHours[i], 0, 0, 0);

      const unix = Math.floor(
        new Date(
          nyString.toLocaleString("en-US", { timeZone: "UTC" })
        ).getTime()
      );

      if (unix > utcNow) {
        return unix;
      }
    }
  }
}

function generate() {
  const unix = getNextTraining();

  const etTime = new Date(unix * 1000).toLocaleTimeString("en-US", {
    timeZone: "America/New_York",
    hour: "numeric",
    minute: "2-digit"
  });

  const message =
`The next training is <t:${unix}:R> at ${etTime} ET. This is <t:${unix}:t> in your local time.`;

  document.getElementById("output").innerText = message;
  navigator.clipboard.writeText(message);
}
</script>

</body>
</html>
